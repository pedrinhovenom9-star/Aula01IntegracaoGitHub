<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Botão</title>
    <style>
        .bnt-personalizado {
            background-color: #4CAF50; /* Verde */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s;
        }

        .bnt-personalizado:hover {
            background-color: #000000;
            
        }

        button{
            text-align: center;
        }
    </style>
</head>
<body>

    <button class="bnt-personalizado" id="Bnt" >Meu Botão </button>
    
 <script>
    const botao = document.getElementById("Bnt");
    
    addEventListener("click", function(){
        alert("Bnt foi clicado com exedo !")
    });
 </script>

</body>
</html>
